<body>
    <div class="header">
        <div class="industry">Real Estate & Property Management</div>
        <h1>🏠 Listing Repurposer</h1>
        <div class="usecase">Listing-to-Social Asset Repurposer</div>
    </div>

    <div class="container">
        <div class="input-section">
            <label for="listing-input">Paste Your MLS Listing Details</label>
            <textarea id="listing-input" placeholder="Paste MLS listing details here...">3-bedroom, 2-bathroom house in the heart of Downtown. Features include hardwood floors, updated kitchen with stainless steel appliances, granite countertops, and an open floor plan. The master bedroom has an ensuite bathroom and walk-in closet. Perfect for families or professionals. Located near schools, parks, and shopping. Move-in ready! Listed at $450,000. Built in 2005, 1,850 sq ft. Property includes a large backyard with mature trees and a two-car garage. Recently renovated HVAC system. Energy-efficient windows throughout. Excellent investment opportunity in a high-demand neighborhood.</textarea>
            <div class="button-group">
                <button class="generate-btn" id="generate-btn" onclick="generateContent()">Generate Assets</button>
                <span class="hint">Try it →</span>
                <button class="clear-btn" id="clear-btn" onclick="clearAll()">Clear</button>
            </div>
            <div id="loading" style="display: none; margin-top: 1rem;" class="loading">
                ✨ Generating social assets...
            </div>
            <div id="error" class="error-message" style="display: none;"></div>
        </div>

        <div class="success-state" id="success-state">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('linkedin')">LinkedIn Post</button>
                <button class="tab-btn" onclick="switchTab('instagram')">Instagram Caption</button>
                <button class="tab-btn" onclick="switchTab('facebook')">Facebook Ad Copy</button>
                <button class="tab-btn" onclick="switchTab('video')">30-Second Video Script</button>
            </div>

            <div id="linkedin" class="tab-content active">
                <div class="output-text" id="linkedin-output"></div>
            </div>

            <div id="instagram" class="tab-content">
                <div class="output-text" id="instagram-output"></div>
            </div>

            <div id="facebook" class="tab-content">
                <div class="output-text" id="facebook-output"></div>
            </div>

            <div id="video" class="tab-content">
                <div class="output-text" id="video-output"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        Powered by Bharat AI · connect <a href="mailto:atulmca@yahoo.com">atulmca@yahoo.com</a>
    </div>

    <script>
        async function generateContent() {
            const listingInput = document.getElementById('listing-input').value.trim();
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const generateBtn = document.getElementById('generate-btn');
            const successState = document.getElementById('success-state');

            if (!listingInput) {
                errorEl.textContent = '⚠️ Please paste listing details to generate content.';
                errorEl.style.display = 'block';
                return;
            }

            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            generateBtn.disabled = true;

            const prompt = `You are a real estate marketing expert. Based on this MLS listing, create four distinct pieces of social media content:

MLS LISTING:
${listingInput}

Please provide EXACTLY 4 outputs in this format:
---LINKEDIN---
[Create a professional, engaging LinkedIn post (100-150 words) that highlights the property's investment potential and key features]

---INSTAGRAM---
[Create an Instagram caption (50-100 words) that's engaging, includes relevant hashtags, and focuses on lifestyle appeal]

---FACEBOOK---
[Create a Facebook ad copy (75-125 words) with a clear call-to-action that encourages people to schedule a viewing or contact the agent]

---VIDEO---
[Create a 30-second video script (approximately 75-90 words when spoken at normal pace) that walks through the key selling points as if narrating a property tour. Include [VISUAL] markers for what should be shown.]

Make each piece distinct, authentic, and optimized for its platform. Use compelling language and focus on benefits to the buyer.`;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'claude-haiku-4-5-20251001',
                        messages: [
                            {
                                role: 'user',
                                content: prompt
                            }
                        ],
                        max_tokens: 2000
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                const content = data.content[0].text;

                const linkedinMatch = content.match(/---LINKEDIN---\n([\s\S]*?)(?=---INSTAGRAM---|$)/);
                const instagramMatch = content.match(/---INSTAGRAM---\n([\s\S]*?)(?=---FACEBOOK---|$)/);
                const facebookMatch = content.match(/---FACEBOOK---\n([\s\S]*?)(?=---VIDEO---|$)/);
                const videoMatch = content.match(/---VIDEO---\n([\s\S]*?)$/);

                const linkedinText = linkedinMatch ? linkedinMatch[1].trim() : 'No content generated';
                const instagramText = instagramMatch ? instagramMatch[1].trim() : 'No content generated';
                const facebookText = facebookMatch ? facebookMatch[1].trim() : 'No content generated';
                const videoText = videoMatch ? videoMatch[1].trim() : 'No content generated';

                document.getElementById('linkedin-output').textContent = linkedinText;
                document.getElementById('instagram-output').textContent = instagramText;
                document.getElementById('facebook-output').textContent = facebookText;
                document.getElementById('video-output').textContent = videoText;

                successState.classList.add('show');

            } catch (err) {
                errorEl.textContent = `❌ Error: ${err.message}. Please try again.`;
                errorEl.style.display = 'block';
            } finally {
                loadingEl.style.display = 'none';
                generateBtn.disabled = false;
            }
        }

        function switchTab(tabName) {
            const tabs = document.querySelectorAll('.tab-content');
            const buttons = document.querySelectorAll('.tab-btn');

            tabs.forEach(tab => tab.classList.remove('active'));
            buttons.forEach(btn => btn.classList.remove('active'));

            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function clearAll() {
            document.getElementById('listing-input').value = '';
            document.getElementById('success-state').classList.remove('show');
            document.getElementById('error').style.display = 'none';
            document.getElementById('generate-btn').disabled = false;
            document.getElementById('listing-input').focus();
        }

        document.getElementById('listing-input').addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                generateContent();
            }
        });
    </script>
</body>
</html>

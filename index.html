<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="header-left">
                    <h1>Listing Repurposer</h1>
                    <div class="header-labels">
                        <span class="header-label">Real Estate & Property Management</span>
                        <span class="header-label">Listing-to-Social Asset Repurposer</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="input-section">
                <div class="section-title">MLS Listing Details</div>
                <textarea id="mlsInput" placeholder="Paste your MLS listing details here...">Luxury 4-bedroom, 3-bathroom home in prestigious Oakmont neighborhood. 3,500 sq ft on 0.5-acre lot. Features include high ceilings, hardwood floors, gourmet kitchen with quartz countertops, and a spa-like master bathroom. Smart home technology throughout. Energy-efficient HVAC system. Two-car garage with epoxy flooring. Stunning backyard with heated pool, built-in grill, and fire pit. Walking distance to top-rated schools and shopping. Move-in ready. Listed at $725,000.</textarea>

                <div class="button-group">
                    <button class="btn btn-primary" id="generateBtn" onclick="generateContent()">Generate Social Assets</button>
                    <span class="hint-text">
                        <span class="hint-arrow">→</span> Try it
                    </span>
                </div>
            </div>

            <div class="output-section">
                <div class="tabs">
                    <button class="tab-button active" onclick="switchTab('linkedin')">LinkedIn</button>
                    <button class="tab-button" onclick="switchTab('instagram')">Instagram</button>
                    <button class="tab-button" onclick="switchTab('facebook')">Facebook</button>
                    <button class="tab-button" onclick="switchTab('video')">Video Script</button>
                </div>

                <div id="linkedinTab" class="tab-content active">
                    <div id="linkedinContent"></div>
                </div>
                <div id="instagramTab" class="tab-content">
                    <div id="instagramContent"></div>
                </div>
                <div id="facebookTab" class="tab-content">
                    <div id="facebookContent"></div>
                </div>
                <div id="videoTab" class="tab-content">
                    <div id="videoContent"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            Powered by Bharat AI · connect <a href="mailto:atulmca@yahoo.com">atulmca@yahoo.com</a>
        </div>
    </div>

    <script>
        const systemPrompt = `You are an expert real estate marketing specialist. Transform MLS listing details into compelling social media content for different platforms. Generate content that is:
- Platform-optimized (tone, length, hashtags, formatting)
- Engagement-focused
- Concise and scannable
- Professional yet conversational

Format your response EXACTLY as follows with clear section breaks:

[LINKEDIN_POST]
(Professional, detailed, thoughtful post for LinkedIn - 150-250 words)

[INSTAGRAM_CAPTION]
(Engaging caption with emojis and hashtags - 100-150 words)

[FACEBOOK_AD]
(Persuasive, call-to-action focused ad copy - 100-150 words)

[VIDEO_SCRIPT]
(30-second video script narration - 75-100 words, natural speaking pace)`;

        async function generateContent() {
            const mlsInput = document.getElementById('mlsInput').value.trim();

            if (!mlsInput) {
                alert('Please paste MLS listing details.');
                return;
            }

            const generateBtn = document.getElementById('generateBtn');
            generateBtn.disabled = true;
            generateBtn.textContent = 'Generating...';

            // Show loading states
            document.getElementById('linkedinContent').innerHTML = '<div class="loading"><div class="spinner"></div>Generating content...</div>';
            document.getElementById('instagramContent').innerHTML = '<div class="loading"><div class="spinner"></div>Generating content...</div>';
            document.getElementById('facebookContent').innerHTML = '<div class="loading"><div class="spinner"></div>Generating content...</div>';
            document.getElementById('videoContent').innerHTML = '<div class="loading"><div class="spinner"></div>Generating content...</div>';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'claude-haiku-4-5-20251001',
                        messages: [
                            {
                                role: 'user',
                                content: `${systemPrompt}\n\nMLS Listing:\n${mlsInput}`
                            }
                        ],
                        max_tokens: 2000,
                    }),
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                const content = data.content[0].text;

                // Parse the response
                const linkedinMatch = content.match(/\[LINKEDIN_POST\]([\s\S]*?)(?=\[INSTAGRAM_CAPTION\]|$)/);
                const instagramMatch = content.match(/\[INSTAGRAM_CAPTION\]([\s\S]*?)(?=\[FACEBOOK_AD\]|$)/);
                const facebookMatch = content.match(/\[FACEBOOK_AD\]([\s\S]*?)(?=\[VIDEO_SCRIPT\]|$)/);
                const videoMatch = content.match(/\[VIDEO_SCRIPT\]([\s\S]*?)$/);

                const linkedinContent = linkedinMatch ? linkedinMatch[1].trim() : 'Unable to generate LinkedIn post.';
                const instagramContent = instagramMatch ? instagramMatch[1].trim() : 'Unable to generate Instagram caption.';
                const facebookContent = facebookMatch ? facebookMatch[1].trim() : 'Unable to generate Facebook ad copy.';
                const videoContent = videoMatch ? videoMatch[1].trim() : 'Unable to generate video script.';

                // Display results
                document.getElementById('linkedinContent').innerHTML = `
                    <button class="copy-btn" onclick="copyToClipboard('linkedinContent')">Copy</button>
                    <pre>${escapeHtml(linkedinContent)}</pre>
                `;

                document.getElementById('instagramContent').innerHTML = `
                    <button class="copy-btn" onclick="copyToClipboard('instagramContent')">Copy</button>
                    <pre>${escapeHtml(instagramContent)}</pre>
                `;

                document.getElementById('facebookContent').innerHTML = `
                    <button class="copy-btn" onclick="copyToClipboard('facebookContent')">Copy</button>
                    <pre>${escapeHtml(facebookContent)}</pre>
                `;

                document.getElementById('videoContent').innerHTML = `
                    <button class="copy-btn" onclick="copyToClipboard('videoContent')">Copy</button>
                    <pre>${escapeHtml(videoContent)}</pre>
                `;

            } catch (error) {
                console.error('Error:', error);
                const errorMsg = `<div class="error">Error generating content: ${error.message}. Please try again.</div>`;
                document.getElementById('linkedinContent').innerHTML = errorMsg;
                document.getElementById('instagramContent').innerHTML = errorMsg;
                document.getElementById('facebookContent').innerHTML = errorMsg;
                document.getElementById('videoContent').innerHTML = errorMsg;
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = 'Generate Social Assets';
            }
        }

        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });

            // Deactivate all buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            const tabMap = {
                'linkedin': 'linkedinTab',
                'instagram': 'instagramTab',
                'facebook': 'facebookTab',
                'video': 'videoTab'
            };

            document.getElementById(tabMap[tabName]).classList.add('active');

            // Activate selected button
            event.target.classList.add('active');
        }

        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            const text = element.querySelector('pre')?.textContent || '';

            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                alert('Failed to copy: ' + err);
            });
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
